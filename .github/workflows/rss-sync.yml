name: Sync Substack RSS to index.html

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python feedparser
        run: pip install feedparser

      - name: Generate index.html from RSS
        run: |
          echo "import feedparser" > generate_index.py
          echo "import datetime" >> generate_index.py
          echo "feed = feedparser.parse('https://ronaldjbotelho.substack.com/feed')" >> generate_index.py
          echo "header = '''<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Ron Botelho – Substack Archive</title><style>body { font-family: Georgia, serif; background-color: #0e0e0e; color: #f0f0f0; max-width: 960px; margin: 0 auto; padding: 2em; line-height: 1.6; } h1, h2 { text-align: center; color: #ffffff; } .article-list { margin-top: 2em; } .article-item { margin-bottom: 1.5em; } .article-item a { color: #3fa9f5; font-size: 1.1em; text-decoration: none; } .article-item a:hover { text-decoration: underline; } .date { display: block; color: #aaa; font-size: 0.9em; margin-top: 0.3em; } .footer { text-align: center; margin-top: 3em; font-size: 0.85em; color: #666; }</style></head><body><h1>Ronald J. Botelho</h1><h2>Substack Article Archive</h2><p style='text-align:center; font-size: 1em; color: #ccc;'><strong>Ronald J. Botelho</strong> is a Ph.D. student in Complex Sciences at Binghamton University. His research draws from intelligence analysis, systems science, and information theory to expose systemic threats to democracy and trace the anatomy of disinformation in modern governance.</p><div class='article-list'>" >> generate_index.py
          echo "footer = '''</div><div class='footer'><p>All content &copy; Ronald J. Botelho | <a href='https://ronaldjbotelho.substack.com'>Back to Substack</a></p></div></body></html>'''" >> generate_index.py
          echo "items = ''" >> generate_index.py
          echo "for entry in feed.entries:" >> generate_index.py
          echo "    title = entry.title" >> generate_index.py
          echo "    link = entry.link" >> generate_index.py
          echo "    date = datetime.datetime(*entry.published_parsed[:6]).strftime('%B %d, %Y')" >> generate_index.py
          echo "    items += f\"\"\"<div class='article-item'><a href='{link}'>{title}</a><span class='date'>{date}</span></div>\\n\"\"\"" >> generate_index.py
          echo "with open('index.html', 'w') as f:" >> generate_index.py
          echo "    f.write(header + items + footer)" >> generate_index.py
          python3 generate_index.py

      - name: Commit and push if updated
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update index.html with all Substack articles"
          git push

